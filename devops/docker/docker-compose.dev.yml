# Quick Start Development Environment
# Run with: docker compose -f devops/docker/docker-compose.dev.yml up -d
# Access: http://localhost:8088
#
# Environment Variables:
# - Loads .env (base configuration)
# - Loads .env.development (development overrides)
# - .env.local has highest priority (if exists, not in git)
# - Variables can be overridden via environment or docker-compose environment section

services:
  api:
    build:
      context: ../..
      dockerfile: devops/docker/Dockerfile.dev
    container_name: healthcare-api
    # Load environment variables from .env files (priority: .env.local > .env.development > .env)
    env_file:
      - ../../.env
      - ../../.env.development
      - ../../.env.local  # Highest priority, optional
    ports:
      - "8088:8088"
      - "5555:5555"
    environment:
      # Application Environment
      NODE_ENV: development
      PORT: 8088
      HOST: 0.0.0.0
      BIND_ADDRESS: 0.0.0.0
      DOCKER_ENV: "true"
      SERVICE_NAME: api
      
      # Database Configuration
      # Connection pool parameters: connection_limit=50, pool_timeout=20
      # Increased for 10M+ users scalability and to prevent connection pool exhaustion
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/userdb?connection_limit=50&pool_timeout=20
      # DIRECT_URL: Clean connection string for Prisma Studio (without Prisma-specific parameters)
      # Prisma Studio needs this to connect properly without "unrecognized configuration parameter" errors
      DIRECT_URL: postgresql://postgres:postgres@postgres:5432/userdb
      PRISMA_SCHEMA_PATH: /app/src/libs/infrastructure/database/prisma/schema.prisma
      
      # Cache Provider Configuration (Dragonfly is default)
      CACHE_ENABLED: "true"
      CACHE_PROVIDER: dragonfly
      
      # Redis Configuration (for Redis provider) - Commented out, using Dragonfly
      # REDIS_HOST: redis
      # REDIS_PORT: 6379
      # REDIS_DB: 0
      # REDIS_TTL: 3600
      # REDIS_PREFIX: "healthcare:"
      # REDIS_ENABLED: "true"
      
      # Dragonfly Configuration (Primary Cache Provider - default provider - using instead of Redis)
      DRAGONFLY_ENABLED: "true"
      DRAGONFLY_HOST: dragonfly
      DRAGONFLY_PORT: 6379
      DRAGONFLY_KEY_PREFIX: "healthcare:"
      
      # JWT Configuration
      JWT_SECRET: dev-jwt-secret-key-change-in-production
      JWT_EXPIRATION: 24h
      JWT_ACCESS_EXPIRES_IN: 24h
      JWT_REFRESH_EXPIRES_IN: 7d
      
      # Session Configuration (Fastify Session with CacheService/Dragonfly)
      SESSION_SECRET: dev-session-secret-change-in-production-min-32-chars-long
      SESSION_TIMEOUT: 86400
      SESSION_SECURE_COOKIES: "false"
      SESSION_SAME_SITE: "lax"
      COOKIE_SECRET: dev-cookie-secret-change-in-production-min-32-chars
      
      # Base URLs
      BASE_URL: http://localhost:8088
      API_URL: http://localhost:8088
      FRONTEND_URL: http://localhost:3000
      
      # CORS Configuration
      CORS_ORIGIN: http://localhost:3000,http://localhost:8088,http://localhost:8082
      CORS_CREDENTIALS: "true"
      
      # Service URLs
      SWAGGER_URL: /docs
      ENABLE_BULL_BOARD: "true"
      BULL_BOARD_URL: /queue-dashboard
      SOCKET_URL: /socket.io
      REDIS_COMMANDER_URL: http://localhost:8082
      PRISMA_STUDIO_URL: http://localhost:5555
      
      VIDEO_ENABLED: ${VIDEO_ENABLED:-true}
      VIDEO_PROVIDER: ${VIDEO_PROVIDER:-cloudflare}
      
      # Values are loaded from .env.development via env_file directive above
      # Set to true to enable webhooks and reduce Socket.IO load for video events
      
      # Video Configuration
      
      # Google OAuth Configuration
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:-}
      GOOGLE_REDIRECT_URI: http://localhost:8088/auth/google/callback
      
      # API Configuration
      API_PREFIX: /api/v1
      
      # Logging Configuration
      LOG_LEVEL: debug
      ENABLE_AUDIT_LOGS: "true"
      
      # Security Configuration
      SECURITY_RATE_LIMIT: "true"
      SECURITY_RATE_LIMIT_MAX: 1000
      SECURITY_RATE_LIMIT_WINDOW_MS: 15000
      TRUST_PROXY: 1
      
      # Rate Limiting
      RATE_LIMIT_TTL: 60
      RATE_LIMIT_MAX: 100
      
      # Email Configuration (Optional - using defaults)
      EMAIL_HOST: sandbox.smtp.mailtrap.io
      EMAIL_PORT: 2525
      EMAIL_SECURE: "false"
      EMAIL_FROM: noreply@healthcare.com
      
      # Development Tools
      ENABLE_SWAGGER: "true"
      ENABLE_PRISMA_STUDIO: "true"
    volumes:
      - ../../:/app
      - healthcare_node_modules:/app/node_modules
      - ./logs:/app/logs
    depends_on:
      postgres:
        condition: service_healthy
      dragonfly:
        condition: service_healthy
      # redis:
      #   condition: service_healthy
    networks:
      - healthcare-network
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8088/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 60s
    restart: unless-stopped
    command: >
      sh -c "
        if [ ! -f /app/node_modules/.bin/cross-env ]; then
          echo 'Installing dependencies (yarn)...' &&
          yarn install --frozen-lockfile --ignore-scripts;
        else
          echo 'Dependencies already installed, skipping yarn install';
        fi &&
        echo 'Waiting for database to be ready...' &&
        until pg_isready -h postgres -p 5432 -U postgres; do
          echo 'Waiting for postgres...'
          sleep 2
        done &&
        echo 'Database is ready!' &&
        echo 'Generating Prisma Client...' &&
        (test -f ./src/libs/infrastructure/database/prisma/schema.prisma || (echo '[ERROR] Schema file not found!' && exit 1)) &&
        (test -f ./src/libs/infrastructure/database/prisma/prisma.config.js || (echo '[ERROR] Config file not found!' && exit 1)) &&
        (export DATABASE_URL="${DATABASE_URL:-postgresql://user:password@localhost:5432/dbname}" && \
         yarn prisma generate --schema=./src/libs/infrastructure/database/prisma/schema.prisma --config=./src/libs/infrastructure/database/prisma/prisma.config.js || (echo '[ERROR] Prisma generate failed!' && exit 1)) &&
        echo 'Fixing Prisma issues (sourcemaps, types, yarn)...' &&
        (node scripts/fix-prisma.js || echo '[WARN] Prisma fixes completed with warnings') &&
        echo 'Running Prisma Database Sync (Development Mode)...' &&
        echo 'Using db push for development (no migration history required)...' &&
        echo 'Note: In production, migrations run automatically via entrypoint.sh' &&
        (node scripts/run-prisma.js push || echo 'Database push completed or skipped') &&
        echo 'Starting application...' &&
        yarn start:dev
      "

  postgres:
    image: postgres:18
    platform: linux/amd64
    container_name: healthcare-postgres
    # NOTE: Port 5432 exposed for local development convenience
    # In production/staging, this port should be commented out for security
    # Access via: docker exec -it healthcare-postgres psql -U postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: userdb
    command: >
      postgres
      -c max_connections=100
      -c shared_buffers=256MB
      -c effective_cache_size=1GB
      -c maintenance_work_mem=64MB
      -c checkpoint_completion_target=0.9
      -c wal_buffers=16MB
      -c default_statistics_target=100
      -c random_page_cost=1.1
      -c effective_io_concurrency=200
      -c work_mem=4MB
      -c min_wal_size=1GB
      -c max_wal_size=4GB
      -c max_worker_processes=4
      -c max_parallel_workers_per_gather=2
      -c max_parallel_workers=4
      -c max_parallel_maintenance_workers=2
      -c idle_in_transaction_session_timeout=30000
      -c statement_timeout=30000
      -c lock_timeout=10000
      -c listen_addresses='*'
      -c log_connections=on
      -c log_disconnections=on
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - healthcare-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d userdb"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 30s
    restart: unless-stopped
    shm_size: 256mb

  dragonfly:
    # Using official Dragonfly registry with specific version (more reliable than latest)
    # If network timeout persists, try: docker pull docker.dragonflydb.io/dragonflydb/dragonfly:v1.27.1 manually first
    image: docker.dragonflydb.io/dragonflydb/dragonfly:v1.27.1
    container_name: healthcare-dragonfly
    ports:
      - "6380:6379"
    command: >
      --alsologtostderr
      --cache_mode=false
      --maxmemory=2gb
      --proactor_threads=4
      --default_lua_flags=allow-undeclared-keys
    volumes:
      - dragonfly_data:/data
    networks:
      - healthcare-network
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -p 6379 ping || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: "2.0"
          memory: 2G
        reservations:
          cpus: "0.5"
          memory: 512M

  # Redis - Commented out, using Dragonfly instead (primary cache provider)
  # Uncomment only if you need Redis as a fallback cache provider
  # redis:
  #   image: redis:7-alpine
  #   container_name: healthcare-redis
  #   ports:
  #     - "6379:6379"
  #   command: redis-server --appendonly yes
  #   volumes:
  #     - redis_data:/data
  #   networks:
  #     - healthcare-network
  #   healthcheck:
  #     test: ["CMD", "redis-cli", "ping"]
  #     interval: 5s
  #     timeout: 5s
  #     retries: 5
  #   restart: unless-stopped

  # Redis Commander - UI for Dragonfly (Redis-compatible)
  # Works with Dragonfly since it's Redis-compatible
  redis-commander:
    image: rediscommander/redis-commander:latest
    container_name: healthcare-redis-ui
    ports:
      - "8082:8081"
    environment:
      - REDIS_HOSTS=dragonfly:dragonfly:6379
      - HTTP_USER=admin
      - HTTP_PASSWORD=admin
    depends_on:
      dragonfly:
        condition: service_healthy
    networks:
      - healthcare-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:8081 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  # Portainer - Docker Management UI (like Vercel Dashboard)
  # Provides comprehensive Docker management: containers, images, networks, volumes, logs, stats
  # Access at: http://localhost:9000
  # Optimized for minimal disk usage: limited logs, no snapshots, strict resource limits
  portainer:
    image: portainer/portainer-ce:latest
    container_name: healthcare-portainer
    ports:
      - "9000:9000"
      - "9443:9443"  # HTTPS port (optional)
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - portainer_data:/data
    networks:
      - healthcare-network
    restart: unless-stopped
    # Optimized command: minimal logging, no analytics
    command: >
      -H unix:///var/run/docker.sock
      --no-analytics
    environment:
      # Minimize disk usage: reduce logging, disable telemetry
      - PORTAINER_LOG_LEVEL=WARN  # Only WARN and ERROR logs (reduces log file size)
      - PORTAINER_TELEMETRY=false  # Disable telemetry data collection
    # Strict resource limits to prevent excessive disk usage
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 256M  # Minimal memory allocation
        reservations:
          cpus: "0.1"
          memory: 128M
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:9000/api/system/status || exit 1"]
      interval: 30s  # Reduced frequency to save resources
      timeout: 5s
      retries: 3
      start_period: 30s

  worker:
    build:
      context: ../..
      dockerfile: devops/docker/Dockerfile.dev
    container_name: healthcare-worker
    # Load environment variables from .env files (priority: .env.local > .env.development > .env)
    env_file:
      - ../../.env
      - ../../.env.development
      - ../../.env.local  # Highest priority, optional
    environment:
      # Application Environment
      NODE_ENV: development
      APP_MODE: worker
      SERVICE_NAME: worker
      DOCKER_ENV: "true"
      
      # Database Configuration
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/userdb?connection_limit=50&pool_timeout=20
      PRISMA_SCHEMA_PATH: /app/src/libs/infrastructure/database/prisma/schema.prisma
      
      # Cache Provider Configuration (Dragonfly is default)
      CACHE_ENABLED: "true"
      CACHE_PROVIDER: dragonfly
      DRAGONFLY_ENABLED: "true"
      DRAGONFLY_HOST: dragonfly
      DRAGONFLY_PORT: 6379
      DRAGONFLY_KEY_PREFIX: "healthcare:"
      
      # JWT Configuration (for queue operations)
      JWT_SECRET: dev-jwt-secret-key-change-in-production
      
      # BullMQ Worker Configuration
      BULL_WORKER_CONCURRENCY: "5"
      BULL_MAX_JOBS_PER_WORKER: "100"
      
      # Logging Configuration
      LOG_LEVEL: debug
      ENABLE_AUDIT_LOGS: "true"
    volumes:
      - ../../:/app
      - healthcare_node_modules:/app/node_modules
      - ./logs:/app/logs
    depends_on:
      postgres:
        condition: service_healthy
      dragonfly:
        condition: service_healthy
      api:
        condition: service_started
    networks:
      - healthcare-network
    restart: unless-stopped
    command: >
      sh -c "
        if [ ! -f /app/node_modules/.bin/ts-node ]; then
          echo 'Installing dependencies (yarn)...' &&
          yarn install --frozen-lockfile --ignore-scripts;
        else
          echo 'Dependencies already installed, skipping yarn install';
        fi &&
        echo 'Waiting for database to be ready...' &&
        until pg_isready -h postgres -p 5432 -U postgres; do
          echo 'Waiting for postgres...'
          sleep 2
        done &&
        echo 'Database is ready!' &&
        echo 'Generating Prisma Client...' &&
        (test -f ./src/libs/infrastructure/database/prisma/schema.prisma || (echo '[ERROR] Schema file not found!' && exit 1)) &&
        (test -f ./src/libs/infrastructure/database/prisma/prisma.config.js || (echo '[ERROR] Config file not found!' && exit 1)) &&
        (export DATABASE_URL="${DATABASE_URL:-postgresql://user:password@localhost:5432/dbname}" && \
         yarn prisma generate --schema=./src/libs/infrastructure/database/prisma/schema.prisma --config=./src/libs/infrastructure/database/prisma/prisma.config.js || (echo '[ERROR] Prisma generate failed!' && exit 1)) &&
        echo 'Fixing Prisma issues (sourcemaps, types, yarn)...' &&
        (node scripts/fix-prisma.js || echo '[WARN] Prisma fixes completed with warnings') &&
        echo 'Starting worker process...' &&
        yarn exec ts-node -r tsconfig-paths/register src/worker-bootstrap.ts
      "

