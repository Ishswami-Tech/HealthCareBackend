  healthcare_node_modules:
    name: healthcare_node_modules
  postgres_data:
    name: healthcare_postgres_data
  dragonfly_data:
    name: healthcare_dragonfly_data
  redis_data:
    name: healthcare_redis_data
  portainer_data:
    name: healthcare_portainer_data
    # Portainer data is minimal: only stores user preferences and settings
    # Expected size: < 50MB (snapshots disabled, minimal logging)

networks:
  healthcare-network:
    name: healthcare_network
    driver: bridge


